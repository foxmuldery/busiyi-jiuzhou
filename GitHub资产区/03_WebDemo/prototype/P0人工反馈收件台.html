<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>不思异：九州 P0 人工反馈收件台</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f4ead0;
        --muted: #d2bd8c;
        --line: rgba(234, 205, 140, 0.26);
        --panel: rgba(23, 17, 12, 0.82);
        --soft: rgba(255, 238, 189, 0.07);
        --accent: #d9aa5b;
        --green: #8fb76c;
        --red: #a64032;
        font-family: "Songti SC", "Noto Serif SC", "STSong", serif;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100svh;
        margin: 0;
        background:
          linear-gradient(90deg, rgba(12, 9, 6, 0.96), rgba(12, 9, 6, 0.6)),
          url("../../02_设计资产/可用素材/背景长图/BG-008_横向山海旅途舞台总场景.png") center / cover no-repeat,
          #15100c;
        color: var(--ink);
      }

      main {
        min-height: 100svh;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 12px;
        padding: clamp(12px, 2.8vw, 26px);
      }

      header,
      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 64px rgba(0, 0, 0, 0.48);
        backdrop-filter: blur(8px);
      }

      header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 14px;
      }

      .brand {
        margin: 0 0 5px;
        color: var(--muted);
        font: 800 12px/1.1 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      h1 {
        margin: 0;
        font-size: clamp(24px, 4vw, 38px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      a,
      button {
        min-height: 38px;
        border: 1px solid rgba(234, 205, 140, 0.26);
        border-radius: 8px;
        padding: 8px 10px;
        background: rgba(255, 238, 189, 0.08);
        color: var(--ink);
        font: 800 12px/1.1 "PingFang SC", "Microsoft YaHei", sans-serif;
        text-align: center;
        text-decoration: none;
        cursor: pointer;
      }

      button.primary,
      a.primary {
        border-color: rgba(217, 170, 91, 0.58);
        background: rgba(217, 170, 91, 0.16);
      }

      .top-actions {
        display: grid;
        grid-template-columns: repeat(3, minmax(96px, 1fr));
        gap: 8px;
      }

      .workspace {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(320px, 0.85fr) minmax(420px, 1.15fr);
        gap: 12px;
      }

      .panel {
        min-height: 0;
        padding: 14px;
      }

      .panel h2 {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 17px;
        line-height: 1.2;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .field {
        display: grid;
        gap: 5px;
      }

      label {
        color: var(--muted);
        font: 800 11px/1.1 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid rgba(234, 205, 140, 0.2);
        border-radius: 8px;
        background: rgba(8, 7, 5, 0.66);
        color: var(--ink);
        padding: 9px;
        font: 13px/1.45 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      textarea {
        min-height: 220px;
        resize: vertical;
      }

      .summary-box {
        min-height: 150px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .button-row,
      .summary-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .summary-row {
        margin: 0 0 10px;
      }

      .chip {
        border: 1px solid rgba(234, 205, 140, 0.2);
        border-radius: 999px;
        padding: 7px 9px;
        background: rgba(255, 238, 189, 0.07);
        color: var(--muted);
        font: 800 11px/1 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .chip strong {
        color: var(--ink);
      }

      .inbox-list {
        display: grid;
        gap: 8px;
        max-height: calc(100svh - 230px);
        overflow: auto;
        padding-right: 2px;
      }

      .inbox-item {
        border: 1px solid rgba(234, 205, 140, 0.18);
        border-radius: 8px;
        padding: 10px;
        background: rgba(8, 7, 5, 0.56);
      }

      .inbox-item[data-status="可验收候选"] {
        border-color: rgba(143, 183, 108, 0.42);
        background: rgba(111, 140, 98, 0.12);
      }

      .inbox-item[data-status="需补材料"] {
        border-color: rgba(217, 170, 91, 0.4);
      }

      .inbox-item h3 {
        margin: 0 0 6px;
        font: 900 14px/1.2 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-bottom: 8px;
      }

      .meta span {
        border: 1px solid rgba(234, 205, 140, 0.14);
        border-radius: 999px;
        padding: 4px 6px;
        color: var(--muted);
        font: 800 10px/1 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .missing {
        margin: 0;
        color: var(--muted);
        font: 12px/1.45 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .hint {
        color: var(--muted);
        font: 12px/1.55 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      @media (max-width: 900px) {
        header,
        .workspace {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <p class="brand">《不思异：九州》P0 人工收口</p>
          <h1>人工反馈收件台</h1>
        </div>
        <div class="top-actions">
          <a class="primary" href="./试玩入口.html">试玩入口</a>
          <a href="./P0真人试玩验收工作台.html">真人验收台</a>
          <a href="./P0音频听感验收工作台.html">音频验收台</a>
        </div>
      </header>

      <div class="workspace">
        <section class="panel" aria-label="新增反馈">
          <h2>新增一份反馈</h2>
          <div class="field-grid">
            <div class="field">
              <label for="testerName">试玩者</label>
              <input id="testerName" type="text" placeholder="姓名或代号" />
            </div>
            <div class="field">
              <label for="channelName">来源</label>
              <input id="channelName" type="text" placeholder="微信 / 飞书 / 现场 / 自测" />
            </div>
            <div class="field">
              <label for="deviceInfo">设备/视口</label>
              <input id="deviceInfo" type="text" placeholder="手机横屏 / Mac Chrome" />
            </div>
            <div class="field">
              <label for="statusOverride">人工状态</label>
              <select id="statusOverride">
                <option value="自动判断">自动判断</option>
                <option value="可验收候选">可验收候选</option>
                <option value="需补材料">需补材料</option>
                <option value="阻断反馈">阻断反馈</option>
              </select>
            </div>
          </div>
          <p class="hint">可以粘贴结局 `P0 试玩反馈包`、统一反馈包、音频验收摘要，或测试者随手发来的文字。</p>
          <textarea id="rawFeedback" placeholder="把测试者发回的整段文字粘贴在这里"></textarea>
          <div class="button-row">
            <button class="primary" id="addEntry" type="button">加入收件台</button>
            <button id="copyFollowup" type="button">复制本条补收消息</button>
            <button id="clearDraft" type="button">清空输入</button>
          </div>
          <p class="hint" id="draftHint">收件台只保存在当前浏览器 localStorage，可随时导出 Markdown 或 JSON。</p>
          <textarea class="summary-box" id="scratchOutput" readonly></textarea>
        </section>

        <section class="panel" aria-label="反馈收件箱">
          <h2>反馈收件箱</h2>
          <div class="summary-row" aria-label="收件统计">
            <span class="chip">总数 <strong id="totalCount">0</strong></span>
            <span class="chip">可验收 <strong id="readyCount">0</strong></span>
            <span class="chip">需补 <strong id="missingCount">0</strong></span>
            <span class="chip">局数 <strong id="runCodeCount">0</strong></span>
            <span class="chip">音频齐 <strong id="audioCount">0</strong></span>
          </div>
          <div class="button-row">
            <button id="copyLedger" type="button">复制收件汇总</button>
            <button id="exportJson" type="button">复制 JSON</button>
            <button id="clearInbox" type="button">清空收件箱</button>
          </div>
          <p class="hint" id="copyState">最后收口时，把收件汇总、真人验收摘要和音频验收摘要一起回填主线程。</p>
          <div class="inbox-list" id="inboxList"></div>
        </section>
      </div>
    </main>

    <script>
      const STORAGE_KEY = "bsi.p0.feedback.inbox.v1";
      const MATERIALS = [
        { id: "playtest", label: "5分钟试玩记录", keywords: ["下一步", "遭遇", "补给", "选路", "地图", "愿意再走", "卡住"] },
        { id: "audio", label: "音频听感复核", keywords: ["音乐", "音效", "声音", "听感", "环境层", "神志层", "默认开"] },
        { id: "recap", label: "本局复盘", keywords: ["P0 试玩反馈包", "本局", "复盘", "路线", "资源", "车轴", "粮草", "神志", "抵达"] }
      ];
      const EVIDENCE = [
        { id: "next", label: "下一步", keywords: ["下一步", "知道", "点哪里", "遭遇", "补给", "选路"] },
        { id: "resource", label: "资源压力", keywords: ["车轴", "粮草", "神志", "资源", "压力", "紧张"] },
        { id: "ui", label: "UI/网页感", keywords: ["横屏", "按钮", "弹窗", "地图", "网页", "卡住", "界面"] },
        { id: "audio", label: "声音", keywords: ["音乐", "音效", "声音", "听感", "打扰", "加分"] },
        { id: "continue", label: "继续意愿", keywords: ["愿意", "再走一站", "继续", "好奇", "像游戏"] }
      ];
      const fields = {
        testerName: document.querySelector("#testerName"),
        channelName: document.querySelector("#channelName"),
        deviceInfo: document.querySelector("#deviceInfo"),
        statusOverride: document.querySelector("#statusOverride"),
        rawFeedback: document.querySelector("#rawFeedback"),
        scratchOutput: document.querySelector("#scratchOutput")
      };
      const inboxList = document.querySelector("#inboxList");
      const copyState = document.querySelector("#copyState");
      const draftHint = document.querySelector("#draftHint");

      function nowStamp() {
        return new Date().toLocaleString("zh-CN");
      }

      function loadEntries() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        } catch {
          localStorage.removeItem(STORAGE_KEY);
          return [];
        }
      }

      function saveEntries(entries) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      }

      function hitsFor(text, rules) {
        const source = String(text || "");
        return rules.map((rule) => ({
          ...rule,
          hits: rule.keywords.filter((word) => source.includes(word))
        }));
      }

      function extractRunCodes(text) {
        const matches = String(text || "").match(/\bJZ-[A-Z0-9-]+/gi) || [];
        return [...new Set(matches.map((code) => code.toUpperCase().replace(/[，。；、,.!?！？:：]+$/g, "")))];
      }

      function getEntryRunCodes(entry) {
        return entry.runCodes || entry.analysis?.runCodes || extractRunCodes(entry.raw);
      }

      function getRunCodeLabel(entry) {
        const runCodes = getEntryRunCodes(entry);
        if (!runCodes.length) return "缺试玩编号";
        if (runCodes.length === 1) return runCodes[0];
        return `多编号 ${runCodes.join(" / ")}`;
      }

      function buildRunCodeGroups(entries) {
        const groups = new Map();
        const missing = [];
        entries.forEach((entry) => {
          const runCodes = getEntryRunCodes(entry);
          if (!runCodes.length) {
            missing.push(entry);
            return;
          }
          runCodes.forEach((runCode) => {
            if (!groups.has(runCode)) groups.set(runCode, []);
            groups.get(runCode).push(entry);
          });
        });
        return { groups, missing };
      }

      function analyzeText(text) {
        const materials = hitsFor(text, MATERIALS);
        const evidence = hitsFor(text, EVIDENCE);
        const runCodes = extractRunCodes(text);
        const missingMaterials = materials.filter((item) => !item.hits.length).map((item) => item.label);
        const missingEvidence = evidence.filter((item) => !item.hits.length).map((item) => item.label);
        const hasEnoughText = String(text || "").trim().length >= 30;
        const autoStatus = !hasEnoughText
          ? "需补材料"
          : missingMaterials.length === 0 && missingEvidence.length <= 1
            ? "可验收候选"
            : "需补材料";
        return {
          materials,
          evidence,
          runCodes,
          missingRunCode: runCodes.length === 0,
          runCodeLabel: runCodes.length ? runCodes.join(" / ") : "缺试玩编号",
          missingMaterials,
          missingEvidence,
          autoStatus,
          hasEnoughText
        };
      }

      function buildEntry() {
        const raw = fields.rawFeedback.value.trim();
        const analysis = analyzeText(raw);
        const override = fields.statusOverride.value;
        const status = override === "自动判断" ? analysis.autoStatus : override;
        const next = status === "可验收候选"
          ? "贴入 P0 真人试玩验收台生成验收摘要"
          : "复制补收消息，追收缺失材料";
        return {
          id: `P0-FB-${Date.now().toString(36).toUpperCase()}`,
          createdAt: nowStamp(),
          tester: fields.testerName.value.trim() || "未填",
          channel: fields.channelName.value.trim() || "未填",
          device: fields.deviceInfo.value.trim() || "未填",
          status,
          next,
          runCodes: analysis.runCodes,
          raw,
          analysis
        };
      }

      function buildFollowup(entry = buildEntry()) {
        const missing = [
          ...(getEntryRunCodes(entry).length ? [] : ["补同一局的 JZ 试玩编号"]),
          ...entry.analysis.missingMaterials.map((item) => `补一段“${item}”`),
          ...entry.analysis.missingEvidence.map((item) => `说明一下“${item}”`)
        ];
        return [
          `想再麻烦你补一下《不思异：九州》试玩反馈。`,
          "",
          missing.length
            ? `目前还差：${[...new Set(missing)].join("；")}。`
            : "目前材料基本齐了，只需要你确认有没有遗漏。",
          "",
          "最省事的补法：",
          "1. 走到结局：点“复盘本局”里的“复制反馈包”发回。",
          "2. 没走到结局：打开“志”，复制本局复盘，并补一句卡在哪里。",
          "3. 只补声音：打开音频听感验收台，点“复制音频验收摘要”。",
          "",
          "不用写长评，按真实感受补几句就行。"
        ].join("\n");
      }

      function buildLedger(entries = loadEntries()) {
        const ready = entries.filter((entry) => entry.status === "可验收候选").length;
        const needs = entries.filter((entry) => entry.status !== "可验收候选").length;
        const { groups, missing } = buildRunCodeGroups(entries);
        return [
          "# 《不思异：九州》P0 人工反馈收件汇总",
          "",
          `生成时间：${nowStamp()}`,
          `总数：${entries.length}；可验收：${ready}；需补：${needs}；试玩局数：${groups.size}；缺试玩编号：${missing.length}`,
          "",
          "## 按试玩编号分组",
          "",
          ...(groups.size
            ? [...groups.entries()].map(([runCode, items]) => `- ${runCode}：${items.map((item) => `${item.id}/${item.tester}`).join("、")}`)
            : ["- 暂无可归档试玩编号。"]),
          "",
          "## 缺试玩编号",
          "",
          ...(missing.length
            ? missing.map((entry) => `- ${entry.id}/${entry.tester}：请补同一局的 JZ 试玩编号。`)
            : ["- 无"]),
          "",
          "## 明细",
          "",
          ...entries.map((entry) => [
            `### ${entry.id} / ${entry.tester}`,
            "",
            `- 时间：${entry.createdAt}`,
            `- 来源：${entry.channel}`,
            `- 设备：${entry.device}`,
            `- 试玩编号：${getRunCodeLabel(entry)}`,
            `- 状态：${entry.status}`,
            `- 下一步：${entry.next}`,
            `- 材料缺口：${entry.analysis.missingMaterials.join("、") || "无"}`,
            `- 证据缺口：${entry.analysis.missingEvidence.join("、") || "无"}`,
            ""
          ].join("\n")),
          "## P0 结论口径",
          "",
          entries.some((entry) => entry.status === "可验收候选")
            ? "已有可进入真人验收台的反馈候选；仍需人工确认质量。"
            : "尚无完整人工反馈候选；继续追收 5 分钟试玩记录和主观听音摘要。"
        ].join("\n");
      }

      function render() {
        const entries = loadEntries();
        document.querySelector("#totalCount").textContent = entries.length;
        document.querySelector("#readyCount").textContent = entries.filter((entry) => entry.status === "可验收候选").length;
        document.querySelector("#missingCount").textContent = entries.filter((entry) => entry.status !== "可验收候选").length;
        document.querySelector("#runCodeCount").textContent = buildRunCodeGroups(entries).groups.size;
        document.querySelector("#audioCount").textContent = entries.filter((entry) => !entry.analysis.missingMaterials.includes("音频听感复核")).length;
        inboxList.replaceChildren();
        if (!entries.length) {
          const empty = document.createElement("p");
          empty.className = "hint";
          empty.textContent = "还没有收到人工反馈。收到后粘贴到左侧，加入收件台。";
          inboxList.append(empty);
          return;
        }
        entries.forEach((entry) => {
          const card = document.createElement("article");
          card.className = "inbox-item";
          card.dataset.status = entry.status;
          const title = document.createElement("h3");
          title.textContent = `${entry.id} / ${entry.tester}`;
          const meta = document.createElement("div");
          meta.className = "meta";
          [entry.status, getRunCodeLabel(entry), entry.channel, entry.device, entry.createdAt].forEach((value) => {
            const span = document.createElement("span");
            span.textContent = value;
            meta.append(span);
          });
          const missing = document.createElement("p");
          missing.className = "missing";
          missing.textContent = `缺口：${[
            ...(getEntryRunCodes(entry).length ? [] : ["试玩编号"]),
            ...entry.analysis.missingMaterials,
            ...entry.analysis.missingEvidence
          ].join("、") || "无"}；下一步：${entry.next}`;
          card.append(title, meta, missing);
          inboxList.append(card);
        });
      }

      async function copyText(text, success) {
        fields.scratchOutput.value = text;
        try {
          await navigator.clipboard.writeText(text);
          copyState.textContent = success;
        } catch {
          fields.scratchOutput.focus();
          fields.scratchOutput.select();
          copyState.textContent = "浏览器未放行复制，已选中文本，可手动复制。";
        }
      }

      document.querySelector("#addEntry").addEventListener("click", () => {
        const entry = buildEntry();
        if (!entry.raw) {
          draftHint.textContent = "请先粘贴一段反馈。";
          return;
        }
        const entries = loadEntries();
        entries.unshift(entry);
        saveEntries(entries);
        fields.scratchOutput.value = buildLedger(entries);
        draftHint.textContent = `已加入 ${entry.id}，状态：${entry.status}。`;
        fields.rawFeedback.value = "";
        render();
      });

      document.querySelector("#copyFollowup").addEventListener("click", () => {
        copyText(buildFollowup(), "本条补收消息已复制。");
      });

      document.querySelector("#copyLedger").addEventListener("click", () => {
        copyText(buildLedger(), "收件汇总已复制，可回填主线程。");
      });

      document.querySelector("#exportJson").addEventListener("click", () => {
        copyText(JSON.stringify(loadEntries(), null, 2), "JSON 已复制。");
      });

      document.querySelector("#clearDraft").addEventListener("click", () => {
        Object.values(fields).forEach((node) => {
          if (node.tagName === "SELECT") node.value = "自动判断";
          else node.value = "";
        });
        draftHint.textContent = "输入已清空。";
      });

      document.querySelector("#clearInbox").addEventListener("click", () => {
        localStorage.removeItem(STORAGE_KEY);
        fields.scratchOutput.value = "";
        copyState.textContent = "收件箱已清空。";
        render();
      });

      fields.rawFeedback.addEventListener("input", () => {
        const entry = buildEntry();
        fields.scratchOutput.value = fields.rawFeedback.value.trim()
          ? buildFollowup(entry)
          : "";
      });

      render();
    </script>
  </body>
</html>

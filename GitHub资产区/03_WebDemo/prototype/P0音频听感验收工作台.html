<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>不思异：九州 P0 音频听感验收工作台</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f4ead0;
        --muted: #d2bd8c;
        --line: rgba(234, 205, 140, 0.26);
        --panel: rgba(23, 17, 12, 0.82);
        --soft: rgba(255, 238, 189, 0.07);
        --accent: #d9aa5b;
        --green: #8fb76c;
        --red: #a64032;
        font-family: "Songti SC", "Noto Serif SC", "STSong", serif;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100svh;
        margin: 0;
        background:
          linear-gradient(90deg, rgba(12, 9, 6, 0.95), rgba(12, 9, 6, 0.58)),
          url("../../02_设计资产/可用素材/背景长图/BG-011_青丘边境荒外古道.png") center / cover no-repeat,
          #15100c;
        color: var(--ink);
      }

      main {
        min-height: 100svh;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 12px;
        padding: clamp(12px, 2.8vw, 26px);
      }

      header,
      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 64px rgba(0, 0, 0, 0.48);
        backdrop-filter: blur(8px);
      }

      header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 14px;
      }

      .brand {
        margin: 0 0 5px;
        color: var(--muted);
        font: 800 12px/1.1 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      h1 {
        margin: 0;
        font-size: clamp(24px, 4vw, 38px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .top-actions {
        display: grid;
        grid-template-columns: repeat(4, minmax(90px, 1fr));
        gap: 8px;
      }

      a,
      button {
        min-height: 38px;
        border: 1px solid rgba(234, 205, 140, 0.26);
        border-radius: 8px;
        padding: 8px 10px;
        background: rgba(255, 238, 189, 0.08);
        color: var(--ink);
        font: 800 12px/1.1 "PingFang SC", "Microsoft YaHei", sans-serif;
        text-align: center;
        text-decoration: none;
        cursor: pointer;
      }

      button.primary,
      a.primary {
        border-color: rgba(217, 170, 91, 0.58);
        background: rgba(217, 170, 91, 0.16);
      }

      .workspace {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(360px, 1.25fr) minmax(300px, 0.75fr);
        gap: 12px;
      }

      .panel {
        min-height: 0;
        padding: 14px;
      }

      .panel h2 {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 17px;
        line-height: 1.2;
      }

      .filter-row,
      .summary-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .chip {
        border: 1px solid rgba(234, 205, 140, 0.2);
        border-radius: 999px;
        padding: 6px 9px;
        background: rgba(255, 238, 189, 0.07);
        color: var(--muted);
        font: 800 11px/1 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .chip strong {
        color: var(--ink);
      }

      .audio-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 9px;
        max-height: calc(100svh - 206px);
        overflow: auto;
        padding-right: 2px;
      }

      .audio-card {
        display: grid;
        gap: 8px;
        border: 1px solid rgba(234, 205, 140, 0.18);
        border-radius: 8px;
        padding: 10px;
        background: rgba(8, 7, 5, 0.58);
      }

      .audio-card[data-active="true"] {
        border-color: rgba(217, 170, 91, 0.62);
        box-shadow: inset 0 0 0 1px rgba(217, 170, 91, 0.18);
      }

      .audio-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
      }

      .audio-head span {
        color: var(--muted);
        font: 900 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .audio-head strong {
        display: block;
        margin-top: 3px;
        font: 900 14px/1.25 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .tag {
        align-self: start;
        border-radius: 999px;
        padding: 5px 7px;
        background: rgba(217, 170, 91, 0.14);
        color: var(--accent);
        font: 900 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }

      .meta span {
        border: 1px solid rgba(234, 205, 140, 0.14);
        border-radius: 999px;
        padding: 4px 6px;
        color: var(--muted);
        font: 800 10px/1 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .card-actions {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      .card-actions button[data-value="pass"][aria-pressed="true"] {
        border-color: rgba(143, 183, 108, 0.6);
        background: rgba(143, 183, 108, 0.18);
      }

      .card-actions button[data-value="revise"][aria-pressed="true"] {
        border-color: rgba(217, 170, 91, 0.6);
        background: rgba(217, 170, 91, 0.18);
      }

      .card-actions button[data-value="reject"][aria-pressed="true"] {
        border-color: rgba(166, 64, 50, 0.62);
        background: rgba(166, 64, 50, 0.18);
      }

      .play-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 6px;
      }

      .play-row button {
        min-height: 34px;
      }

      textarea,
      input[type="text"] {
        width: 100%;
        border: 1px solid rgba(234, 205, 140, 0.22);
        border-radius: 8px;
        padding: 9px;
        background: rgba(10, 8, 6, 0.72);
        color: var(--ink);
        font: 13px/1.45 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      textarea {
        resize: vertical;
        min-height: 96px;
      }

      .side-stack {
        display: grid;
        gap: 10px;
      }

      .field {
        display: grid;
        gap: 5px;
      }

      .field label {
        color: var(--muted);
        font: 800 11px/1.1 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .verdict {
        border: 1px solid rgba(143, 183, 108, 0.38);
        border-radius: 8px;
        padding: 12px;
        background: rgba(111, 140, 98, 0.14);
      }

      .verdict[data-tone="fix"] {
        border-color: rgba(217, 170, 91, 0.46);
        background: rgba(217, 170, 91, 0.12);
      }

      .verdict[data-tone="block"] {
        border-color: rgba(166, 64, 50, 0.5);
        background: rgba(166, 64, 50, 0.14);
      }

      .verdict span {
        display: block;
        color: var(--muted);
        font: 800 11px/1.1 ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .verdict strong {
        display: block;
        margin-top: 4px;
        font-size: 20px;
      }

      .coverage-panel {
        display: grid;
        gap: 8px;
        border: 1px solid rgba(234, 205, 140, 0.18);
        border-radius: 8px;
        padding: 10px;
        background: rgba(255, 238, 189, 0.05);
      }

      .coverage-panel h3 {
        margin: 0;
        color: var(--accent);
        font: 900 13px/1.2 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .coverage-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .coverage-item {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 7px;
        align-items: center;
        border: 1px solid rgba(234, 205, 140, 0.14);
        border-radius: 8px;
        padding: 7px 8px;
        color: rgba(244, 234, 208, 0.72);
        font: 12px/1.2 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .coverage-item[data-complete="true"] {
        border-color: rgba(143, 183, 108, 0.36);
        background: rgba(111, 140, 98, 0.12);
        color: var(--ink);
      }

      .coverage-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: rgba(244, 234, 208, 0.32);
      }

      .coverage-item[data-complete="true"] .coverage-dot {
        background: var(--green);
      }

      .coverage-count {
        color: var(--muted);
        font: 900 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .audition-panel {
        display: grid;
        gap: 8px;
        border: 1px solid rgba(234, 205, 140, 0.18);
        border-radius: 8px;
        padding: 10px;
        background:
          linear-gradient(90deg, rgba(217, 170, 91, 0.1), transparent 68%),
          rgba(255, 238, 189, 0.045);
      }

      .audition-panel h3 {
        margin: 0;
        color: var(--accent);
        font: 900 13px/1.2 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .audition-now {
        display: grid;
        gap: 3px;
        min-height: 50px;
        border: 1px solid rgba(234, 205, 140, 0.14);
        border-radius: 8px;
        padding: 8px;
        background: rgba(8, 7, 5, 0.5);
      }

      .audition-now span {
        color: var(--muted);
        font: 900 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .audition-now strong {
        font: 900 14px/1.25 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .audition-controls {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      .revision-panel {
        display: grid;
        gap: 8px;
        border: 1px solid rgba(217, 170, 91, 0.22);
        border-radius: 8px;
        padding: 10px;
        background: rgba(217, 170, 91, 0.065);
      }

      .revision-panel h3 {
        margin: 0;
        color: var(--accent);
        font: 900 13px/1.2 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .revision-list {
        display: grid;
        gap: 6px;
      }

      .revision-item {
        display: grid;
        gap: 3px;
        border: 1px solid rgba(234, 205, 140, 0.14);
        border-radius: 8px;
        padding: 7px 8px;
        background: rgba(8, 7, 5, 0.42);
        color: rgba(244, 234, 208, 0.76);
        font: 12px/1.35 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .revision-item strong {
        color: var(--ink);
        font-size: 12px;
      }

      .revision-item span {
        color: var(--muted);
        font: 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .copy-state {
        min-height: 18px;
        color: var(--muted);
        font: 12px/1.35 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .warning {
        border-left: 3px solid var(--accent);
        padding: 8px 10px;
        background: rgba(217, 170, 91, 0.1);
        color: var(--muted);
        font: 12px/1.45 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      @media (max-width: 860px) {
        main {
          padding: 10px;
        }

        header,
        .workspace {
          grid-template-columns: 1fr;
        }

        .top-actions {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .audio-grid {
          grid-template-columns: 1fr;
          max-height: none;
          overflow: visible;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <p class="brand">《不思异：九州》内部 P0 验收</p>
          <h1>音频听感工作台</h1>
        </div>
        <nav class="top-actions" aria-label="页面入口">
          <a href="./试玩入口.html">试玩入口</a>
          <a href="./index.html?fresh=1&amp;drawer=settings">游戏内试听</a>
          <button id="copyAudioTask" type="button">复制听音任务</button>
          <button class="primary" id="stopAll" type="button">停止声音</button>
        </nav>
      </header>

      <div class="workspace">
        <section class="panel">
          <div class="summary-row" id="summaryRow"></div>
          <div class="filter-row" id="filterRow" aria-label="音频分组筛选"></div>
          <div class="audio-grid" id="audioGrid"></div>
        </section>

        <section class="panel side-stack">
          <div class="verdict" id="verdict">
            <span id="verdictCode">AUD-PENDING</span>
            <strong id="verdictTitle">待试听</strong>
            <p id="verdictHint">先听 6 首音乐，再听环境层、神志层和短音效。</p>
          </div>

          <div class="coverage-panel" aria-label="音频分层验收门槛">
            <h3>分层验收门槛</h3>
            <div class="coverage-grid" id="coverageGrid"></div>
            <p class="copy-state" id="coverageHint">逐层标记听感结论后，这里会显示哪些声音层仍缺判断。</p>
          </div>

          <div class="audition-panel" aria-label="顺序试听流程">
            <h3>顺序试听</h3>
            <div class="audition-now" id="auditionNow">
              <span>0/0</span>
              <strong>待载入音频</strong>
            </div>
            <div class="audition-controls">
              <button id="prevAudition" type="button">上一条</button>
              <button class="primary" id="playAudition" type="button">听当前</button>
              <button id="nextAudition" type="button">下一条</button>
            </div>
            <p class="copy-state" id="auditionHint">标记保留、待改或弃用后，会自动跳到下一条未评声音。</p>
          </div>

          <div class="revision-panel" aria-label="待改和弃用重做清单">
            <h3>待改/弃用重做清单</h3>
            <div class="revision-list" id="revisionList"></div>
            <button id="copyRevisionPlan" type="button">复制重做清单</button>
            <p class="copy-state" id="revisionHint">标记“待改”或“弃用”后，这里会生成下一轮音频任务。</p>
          </div>

          <div class="warning">
            本页只用于内部 Demo 听感复核。`review-pending` 和 `demo-temporary` 都不能标为正式发布素材。
          </div>

          <div class="field">
            <label for="reviewer">试听者</label>
            <input id="reviewer" type="text" placeholder="姓名或代号" />
          </div>

          <div class="field">
            <label for="sceneNote">试听场景</label>
            <input id="sceneNote" type="text" value="P0 第一章横屏试玩 / 正常行旅 / 低资源压力场景" />
          </div>

          <div class="field">
            <label for="runCode">试玩编号</label>
            <input id="runCode" type="text" placeholder="从游戏内听感模板或网址自动带入" />
          </div>

          <div class="field">
            <label for="globalNote">整体听感</label>
            <textarea id="globalNote" placeholder="例如：哪首最像九州行旅；哪个声音打扰；是否愿意默认开低音量音乐。"></textarea>
          </div>

          <div class="field">
            <label for="summaryOutput">可复制验收摘要</label>
            <textarea id="summaryOutput" readonly></textarea>
          </div>

          <button class="primary" id="copySummary" type="button">复制音频验收摘要</button>
          <button id="saveLocal" type="button">保存本机草稿</button>
          <button id="clearAll" type="button">清空</button>
          <div class="copy-state" id="copyState" aria-live="polite"></div>
        </section>
      </div>
    </main>

    <script src="./data.js"></script>
    <script>
      const STORAGE_KEY = "busi_audio_review_p0_v1";
      const data = window.BSI_GAME_DATA || {};
      const audioAssets = data.audioAssets || {};
      const groups = [
        { key: "all", label: "全部" },
        { key: "music", label: "音乐" },
        { key: "ambience", label: "环境" },
        { key: "sanity", label: "神志" },
        { key: "warning", label: "告急" },
        { key: "ui", label: "短音" },
        { key: "map-sfx", label: "地图" }
      ];
      const decisionLabels = {
        pass: "保留",
        revise: "待改",
        reject: "弃用"
      };
      const coverageGroups = groups.filter((group) => group.key !== "all");
      let filter = "all";
      let activeKey = "";
      let auditionIndex = 0;
      let currentAudio = null;
      let reviewState = {};

      const audioGrid = document.querySelector("#audioGrid");
      const filterRow = document.querySelector("#filterRow");
      const summaryRow = document.querySelector("#summaryRow");
      const verdict = document.querySelector("#verdict");
      const verdictCode = document.querySelector("#verdictCode");
      const verdictTitle = document.querySelector("#verdictTitle");
      const verdictHint = document.querySelector("#verdictHint");
      const coverageGrid = document.querySelector("#coverageGrid");
      const coverageHint = document.querySelector("#coverageHint");
      const auditionNow = document.querySelector("#auditionNow");
      const auditionHint = document.querySelector("#auditionHint");
      const revisionList = document.querySelector("#revisionList");
      const revisionHint = document.querySelector("#revisionHint");
      const summaryOutput = document.querySelector("#summaryOutput");
      const reviewer = document.querySelector("#reviewer");
      const sceneNote = document.querySelector("#sceneNote");
      const runCode = document.querySelector("#runCode");
      const globalNote = document.querySelector("#globalNote");
      const copyState = document.querySelector("#copyState");
      const urlParams = new URLSearchParams(window.location.search);
      const urlRunCode = urlParams.get("run") || urlParams.get("runCode") || "";
      const urlSource = urlParams.get("source") || "";
      const urlStatus = urlParams.get("status") || "";
      const urlLocation = urlParams.get("location") || "";

      function assetType(asset) {
        if (asset.type === "sanity-low") return "sanity";
        if (asset.type === "map-sfx") return "map-sfx";
        return asset.type || "other";
      }

      function assets() {
        return Object.entries(audioAssets)
          .map(([key, asset]) => ({ key, ...asset, group: assetType(asset) }))
          .filter((asset) => asset.src && asset.id);
      }

      function ensureState(key) {
        if (!reviewState[key]) reviewState[key] = { decision: "", note: "" };
        return reviewState[key];
      }

      function stopAudio() {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.currentTime = 0;
        }
        currentAudio = null;
        activeKey = "";
        render();
      }

      async function playAsset(asset) {
        stopAudio();
        activeKey = asset.key;
        currentAudio = new Audio(asset.src);
        currentAudio.loop = Boolean(asset.loop);
        currentAudio.volume = Math.min(Math.max(Number(asset.volume) || 0.18, 0.04), 0.45);
        try {
          await currentAudio.play();
          copyState.textContent = `${asset.id} 正在试听。`;
          if (!currentAudio.loop) {
            currentAudio.onended = () => {
              activeKey = "";
              render();
            };
          }
        } catch {
          copyState.textContent = "浏览器阻止了播放，请再点一次试听。";
          activeKey = "";
        }
        render();
      }

      function filteredAssets() {
        const list = assets();
        if (filter === "all") return list;
        return list.filter((asset) => asset.group === filter);
      }

      function currentAuditionList() {
        return filteredAssets();
      }

      function currentAuditionAsset() {
        const list = currentAuditionList();
        if (!list.length) return null;
        auditionIndex = Math.max(0, Math.min(auditionIndex, list.length - 1));
        return list[auditionIndex];
      }

      function jumpAudition(delta) {
        const list = currentAuditionList();
        if (!list.length) return;
        auditionIndex = (auditionIndex + delta + list.length) % list.length;
        render();
      }

      function advanceToNextUnreviewed(fromKey) {
        const list = currentAuditionList();
        if (!list.length) return;
        const currentIndex = Math.max(0, list.findIndex((asset) => asset.key === fromKey));
        const nextIndex = list.findIndex((asset, index) => index > currentIndex && !ensureState(asset.key).decision);
        if (nextIndex >= 0) {
          auditionIndex = nextIndex;
          return;
        }
        const wrapIndex = list.findIndex((asset) => !ensureState(asset.key).decision);
        auditionIndex = wrapIndex >= 0 ? wrapIndex : Math.min(currentIndex + 1, list.length - 1);
      }

      function setDecision(key, decision) {
        const state = ensureState(key);
        const nextDecision = state.decision === decision ? "" : decision;
        state.decision = nextDecision;
        if (nextDecision) advanceToNextUnreviewed(key);
        render();
      }

      function setNote(key, note) {
        ensureState(key).note = note;
        renderRevisionPanel();
        renderSummaryOnly();
      }

      function renderFilters() {
        filterRow.innerHTML = "";
        groups.forEach((group) => {
          const count = group.key === "all"
            ? assets().length
            : assets().filter((asset) => asset.group === group.key).length;
          if (!count) return;
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = `${group.label} ${count}`;
          button.className = group.key === filter ? "primary" : "";
          button.addEventListener("click", () => {
            filter = group.key;
            auditionIndex = 0;
            render();
          });
          filterRow.append(button);
        });
      }

      function renderSummaryChips() {
        const list = assets();
        const reviewed = list.filter((asset) => ensureState(asset.key).decision).length;
        const keep = list.filter((asset) => ensureState(asset.key).decision === "pass").length;
        const temporary = list.filter((asset) => asset.status === "demo-temporary").length;
        const pending = list.filter((asset) => asset.status === "review-pending").length;
        summaryRow.innerHTML = [
          `<span class="chip">已评 <strong>${reviewed}/${list.length}</strong></span>`,
          `<span class="chip">保留 <strong>${keep}</strong></span>`,
          `<span class="chip">待授权 <strong>${pending}</strong></span>`,
          `<span class="chip">临时 <strong>${temporary}</strong></span>`
        ].join("");
      }

      function getCoverage() {
        const list = assets();
        return coverageGroups
          .map((group) => {
            const groupAssets = list.filter((asset) => asset.group === group.key);
            const reviewed = groupAssets.filter((asset) => ensureState(asset.key).decision).length;
            return {
              key: group.key,
              label: group.label,
              total: groupAssets.length,
              reviewed,
              complete: groupAssets.length > 0 && reviewed === groupAssets.length
            };
          })
          .filter((item) => item.total > 0);
      }

      function renderCoverage() {
        if (!coverageGrid) return [];
        const coverage = getCoverage();
        coverageGrid.replaceChildren();
        coverage.forEach((item) => {
          const row = document.createElement("div");
          const dot = document.createElement("span");
          const label = document.createElement("span");
          const count = document.createElement("span");
          row.className = "coverage-item";
          row.dataset.complete = item.complete ? "true" : "false";
          dot.className = "coverage-dot";
          label.textContent = item.label;
          count.className = "coverage-count";
          count.textContent = `${item.reviewed}/${item.total}`;
          row.append(dot, label, count);
          coverageGrid.append(row);
        });
        const missing = coverage.filter((item) => !item.complete).map((item) => `${item.label}${item.reviewed}/${item.total}`);
        if (coverageHint) {
          coverageHint.textContent = missing.length
            ? `仍缺听感结论：${missing.join("、")}。`
            : "音乐、环境、神志、告急、短音、地图层都已有听感结论。";
        }
        return coverage;
      }

      function renderAuditionPanel() {
        if (!auditionNow) return;
        const list = currentAuditionList();
        const asset = currentAuditionAsset();
        if (!asset) {
          auditionNow.innerHTML = "<span>0/0</span><strong>当前分组没有音频</strong>";
          if (auditionHint) auditionHint.textContent = "切换到全部或其他分组继续试听。";
          return;
        }
        const state = ensureState(asset.key);
        auditionNow.innerHTML = `
          <span>${auditionIndex + 1}/${list.length} · ${asset.id} · ${asset.group}</span>
          <strong>${asset.name}</strong>
        `;
        if (auditionHint) {
          auditionHint.textContent = state.decision
            ? `当前结论：${decisionLabels[state.decision]}。可继续下一条，或修改本条备注。`
            : "标记保留、待改或弃用后，会自动跳到下一条未评声音。";
        }
      }

      function getRevisionItems() {
        return assets()
          .map((asset) => ({ asset, state: ensureState(asset.key) }))
          .filter((item) => item.state.decision === "revise" || item.state.decision === "reject");
      }

      function renderRevisionPanel() {
        if (!revisionList) return [];
        const items = getRevisionItems();
        revisionList.replaceChildren();
        if (!items.length) {
          const empty = document.createElement("div");
          empty.className = "revision-item";
          empty.innerHTML = "<strong>暂无待改或弃用声音</strong><span>REVISION-CLEAR</span>";
          revisionList.append(empty);
        } else {
          items.slice(0, 5).forEach(({ asset, state }) => {
            const row = document.createElement("div");
            row.className = "revision-item";
            row.innerHTML = `
              <strong>${asset.id}｜${asset.name}</strong>
              <span>${decisionLabels[state.decision]} · ${asset.group} · ${asset.status}</span>
              <div>${state.note || "未写备注，请补充问题原因或替换方向。"}</div>
            `;
            revisionList.append(row);
          });
        }
        if (revisionHint) {
          revisionHint.textContent = items.length
            ? `当前有 ${items.length} 条需要 F 线程重做或替换。`
            : "当前没有重做项；仍需人工确认是否真的适合作为 P0 声音方向。";
        }
        return items;
      }

      function buildRevisionPlan() {
        const items = getRevisionItems();
        const lines = [
          "# 《不思异：九州》P0 音频待改/弃用重做清单",
          "",
          `生成时间：${new Date().toLocaleString("zh-CN")}`,
          `试玩编号：${runCode.value || "未填"}`,
          `试听者：${reviewer.value || "未填"}`,
          `试听场景：${sceneNote.value || "未填"}`,
          `重做数量：${items.length}`,
          "",
          "## 任务边界",
          "",
          "- 只处理听感方向，不把任何素材标为正式授权完成。",
          "- 待改：保留用途或气质，但需要重新混音、换乐器、降存在感或重生成。",
          "- 弃用：不再作为当前 P0 默认候选，需另找方向。",
          "",
          "## 待处理条目"
        ];
        if (!items.length) {
          lines.push("", "暂无待改或弃用条目。");
        } else {
          items.forEach(({ asset, state }) => {
            lines.push(
              "",
              `### ${asset.id} ${asset.name}`,
              "",
              `- 当前结论：${decisionLabels[state.decision]}`,
              `- 声音层：${asset.group}`,
              `- 当前状态：${asset.status}`,
              `- 当前用途：${asset.description || "未写用途"}`,
              `- 循环/短音：${asset.loop ? "循环" : "短音"}`,
              `- 当前音量：${asset.volume}`,
              `- 听感备注：${state.note || "未写备注"}`,
              `- 下一轮建议：${state.decision === "reject" ? "另找或重生成替代候选。" : "保留功能定位，按备注做更克制的替换候选。"}`
            );
          });
        }
        lines.push("", "## 整体听感", "", globalNote.value || "未填");
        return lines.join("\n");
      }

      function buildAudioTaskText() {
        const audioUrlObject = new URL("./P0音频听感验收工作台.html", window.location.href);
        if (runCode.value) audioUrlObject.searchParams.set("run", runCode.value);
        audioUrlObject.searchParams.set("source", "audio-workbench");
        const audioUrl = audioUrlObject.href;
        const gameUrl = new URL("./index.html?fresh=1&drawer=settings", window.location.href).href;
        const musicAssets = assets().filter((asset) => asset.group === "music");
        return [
          "《不思异：九州》P0 3 分钟听音任务",
          "",
          `试玩编号：${runCode.value || "未填"}`,
          `听音入口：${audioUrl}`,
          `游戏内试听入口：${gameUrl}`,
          "",
          "请只判断听感，不判断授权，也不要把素材当作正式发布版本。",
          "",
          "## 怎么听",
          "",
          "1. 打开听音入口，先点“顺序试听”里的“听当前”。",
          "2. 先听完 6 首音乐候选；每条只需要标记“保留 / 待改 / 弃用”。",
          "3. 如果还有时间，再听环境、神志、告急、短音、地图层。",
          "4. 在“整体听感”里写一句：是否愿意默认打开低音量音乐，以及哪一条最像《山海经》远行。",
          "5. 点“复制音频验收摘要”，把整段文字发回。",
          "",
          "## 优先听的 6 首音乐",
          ...musicAssets.map((asset) => `- ${asset.id}｜${asset.name}`),
          "",
          "## 判断标准",
          "",
          "- 保留：愿意在当前 P0 试玩里继续听，不明显打扰阅读。",
          "- 待改：方向对，但太满、太吵、太现代、循环感太明显，或需要降存在感。",
          "- 弃用：不适合《不思异：九州》的神秘远行气质。",
          "",
          "## 最后发回",
          "",
          "请发回“《不思异：九州》P0 音频听感验收摘要”。"
        ].join("\n");
      }

      function renderCards() {
        audioGrid.innerHTML = "";
        filteredAssets().forEach((asset) => {
          const state = ensureState(asset.key);
          const card = document.createElement("article");
          card.className = "audio-card";
          card.dataset.active = String(activeKey === asset.key);
          card.innerHTML = `
            <div class="audio-head">
              <div>
                <span>${asset.id}</span>
                <strong>${asset.name}</strong>
              </div>
              <span class="tag">${asset.group}</span>
            </div>
            <div class="meta">
              <span>${asset.status}</span>
              <span>${asset.loop ? "循环" : "短音"}</span>
              <span>音量 ${asset.volume}</span>
            </div>
            <div class="play-row">
              <button type="button" data-play="${asset.key}">${activeKey === asset.key ? "试听中" : "试听"}</button>
              <button type="button" data-stop="${asset.key}">停</button>
            </div>
            <div class="card-actions" aria-label="${asset.id} 结论">
              <button type="button" data-decision="${asset.key}" data-value="pass" aria-pressed="${state.decision === "pass"}">保留</button>
              <button type="button" data-decision="${asset.key}" data-value="revise" aria-pressed="${state.decision === "revise"}">待改</button>
              <button type="button" data-decision="${asset.key}" data-value="reject" aria-pressed="${state.decision === "reject"}">弃用</button>
            </div>
            <textarea data-note="${asset.key}" placeholder="这条声音的听感备注">${state.note || ""}</textarea>
          `;
          audioGrid.append(card);
        });
      }

      function renderVerdict() {
        const list = assets();
        const music = list.filter((asset) => asset.group === "music");
        const reviewed = list.filter((asset) => ensureState(asset.key).decision).length;
        const musicReviewed = music.filter((asset) => ensureState(asset.key).decision).length;
        const rejected = list.filter((asset) => ensureState(asset.key).decision === "reject").length;
        const coverage = getCoverage();
        const coveredGroups = coverage.filter((item) => item.complete).length;

        if (reviewed === list.length && rejected === 0 && coveredGroups === coverage.length) {
          verdict.dataset.tone = "pass";
          verdictCode.textContent = "AUD-P0-PASS-CANDIDATE";
          verdictTitle.textContent = "可进入 P0 内部试听";
          verdictHint.textContent = "所有音频已有结论，但仍需授权复核后才能进入正式素材。";
        } else if (musicReviewed >= music.length && reviewed >= Math.ceil(list.length * 0.6)) {
          verdict.dataset.tone = "fix";
          verdictCode.textContent = "AUD-P0-FIX";
          verdictTitle.textContent = "主音乐可判断，短音待补";
          verdictHint.textContent = `P0 可以继续试玩；已完成 ${coveredGroups}/${coverage.length} 个声音层的听感判断。`;
        } else {
          verdict.dataset.tone = "block";
          verdictCode.textContent = "AUD-PENDING";
          verdictTitle.textContent = "待试听";
          verdictHint.textContent = `已评 ${reviewed}/${list.length}，至少先把 6 首音乐听完。`;
        }
      }

      function renderSummaryOnly() {
        const list = assets();
        const coverage = getCoverage();
        const missingCoverage = coverage.filter((item) => !item.complete);
        const lines = [
          "《不思异：九州》P0 音频听感验收摘要",
          `试玩编号：${runCode.value || "未填"}`,
          `试听者：${reviewer.value || "未填"}`,
          `试听场景：${sceneNote.value || "未填"}`,
          `结论：${verdictCode.textContent} / ${verdictTitle.textContent}`,
          `分层缺口：${missingCoverage.map((item) => `${item.label}${item.reviewed}/${item.total}`).join("、") || "无"}`,
          "",
          "## 分层验收门槛",
          ...coverage.map((item) => `- ${item.complete ? "[x]" : "[ ]"} ${item.label}：${item.reviewed}/${item.total}`),
          "",
          "## 分项结论"
        ];
        list.forEach((asset) => {
          const state = ensureState(asset.key);
          lines.push(`- ${asset.id}｜${asset.name}｜${decisionLabels[state.decision] || "未评"}｜${asset.status}｜${state.note || "无备注"}`);
        });
        lines.push("", "## 整体听感", globalNote.value || "未填");
        lines.push("", "## 待改/弃用重做清单");
        const revisionItems = getRevisionItems();
        if (!revisionItems.length) {
          lines.push("无");
        } else {
          revisionItems.forEach(({ asset, state }) => {
            lines.push(`- ${asset.id}｜${decisionLabels[state.decision]}｜${asset.group}｜${state.note || "未写备注"}`);
          });
        }
        lines.push("", "## 注意", "以上只代表内部 Demo 听感，不代表正式授权或最终音色。");
        summaryOutput.value = lines.join("\n");
      }

      function render() {
        renderFilters();
        renderSummaryChips();
        renderCards();
        renderCoverage();
        renderAuditionPanel();
        renderRevisionPanel();
        renderVerdict();
        renderSummaryOnly();
      }

      function collectState() {
        return {
          reviewer: reviewer.value,
          sceneNote: sceneNote.value,
          runCode: runCode.value,
          globalNote: globalNote.value,
          reviewState
        };
      }

      function restoreState() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
          reviewer.value = saved.reviewer || "";
          sceneNote.value = saved.sceneNote || sceneNote.value;
          runCode.value = urlRunCode || saved.runCode || "";
          globalNote.value = saved.globalNote || "";
          reviewState = saved.reviewState || {};
          if (urlRunCode && copyState) {
            const detail = [
              `已带入试玩编号 ${urlRunCode}`,
              urlLocation ? `地点 ${urlLocation}` : "",
              urlStatus ? `状态 ${urlStatus}` : "",
              urlSource ? `来源 ${urlSource}` : ""
            ].filter(Boolean).join("；");
            copyState.textContent = detail + "。";
          }
        } catch {
          localStorage.removeItem(STORAGE_KEY);
          runCode.value = urlRunCode || "";
        }
      }

      async function copySummary() {
        try {
          await navigator.clipboard.writeText(summaryOutput.value);
          copyState.textContent = "音频验收摘要已复制。";
        } catch {
          summaryOutput.focus();
          summaryOutput.select();
          copyState.textContent = "浏览器未放行复制，摘要已选中，可手动复制。";
        }
      }

      async function copyRevisionPlan() {
        const text = buildRevisionPlan();
        try {
          await navigator.clipboard.writeText(text);
          copyState.textContent = "音频重做清单已复制，可交给 F 线程或用于下一轮生成。";
        } catch {
          summaryOutput.value = text;
          summaryOutput.focus();
          summaryOutput.select();
          copyState.textContent = "浏览器未放行复制，重做清单已放入摘要框，可手动复制。";
        }
      }

      async function copyAudioTask() {
        const text = buildAudioTaskText();
        try {
          await navigator.clipboard.writeText(text);
          copyState.textContent = "3 分钟听音任务已复制，可直接发给听音人。";
        } catch {
          summaryOutput.value = text;
          summaryOutput.focus();
          summaryOutput.select();
          copyState.textContent = "浏览器未放行复制，听音任务已放入摘要框，可手动复制。";
        }
      }

      audioGrid.addEventListener("click", (event) => {
        const playKey = event.target?.dataset?.play;
        const stopKey = event.target?.dataset?.stop;
        const decisionKey = event.target?.dataset?.decision;
        if (playKey) {
          const asset = assets().find((item) => item.key === playKey);
          if (asset) playAsset(asset);
        }
        if (stopKey) stopAudio();
        if (decisionKey) setDecision(decisionKey, event.target.dataset.value);
      });

      audioGrid.addEventListener("input", (event) => {
        const noteKey = event.target?.dataset?.note;
        if (noteKey) setNote(noteKey, event.target.value);
      });

      [reviewer, sceneNote, runCode, globalNote].forEach((node) => {
        node.addEventListener("input", renderSummaryOnly);
      });
      document.querySelector("#stopAll").addEventListener("click", stopAudio);
      document.querySelector("#prevAudition").addEventListener("click", () => jumpAudition(-1));
      document.querySelector("#nextAudition").addEventListener("click", () => jumpAudition(1));
      document.querySelector("#playAudition").addEventListener("click", () => {
        const asset = currentAuditionAsset();
        if (asset) playAsset(asset);
      });
      document.querySelector("#copyAudioTask").addEventListener("click", copyAudioTask);
      document.querySelector("#copySummary").addEventListener("click", copySummary);
      document.querySelector("#copyRevisionPlan").addEventListener("click", copyRevisionPlan);
      document.querySelector("#saveLocal").addEventListener("click", () => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(collectState()));
        copyState.textContent = "本机草稿已保存。";
      });
      document.querySelector("#clearAll").addEventListener("click", () => {
        localStorage.removeItem(STORAGE_KEY);
        reviewState = {};
        reviewer.value = "";
        runCode.value = "";
        globalNote.value = "";
        stopAudio();
        render();
        copyState.textContent = "已清空。";
      });

      restoreState();
      render();
    </script>
  </body>
</html>

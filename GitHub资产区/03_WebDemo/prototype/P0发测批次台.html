<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>不思异：九州 P0 发测批次台</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f4ead0;
        --muted: #d2bd8c;
        --line: rgba(234, 205, 140, 0.26);
        --panel: rgba(23, 17, 12, 0.84);
        --soft: rgba(255, 238, 189, 0.07);
        --accent: #d9aa5b;
        --green: #8fb76c;
        --red: #a64032;
        font-family: "Songti SC", "Noto Serif SC", "STSong", serif;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100svh;
        margin: 0;
        background:
          linear-gradient(90deg, rgba(12, 9, 6, 0.97), rgba(12, 9, 6, 0.62)),
          url("../../02_设计资产/可用素材/背景长图/BG-008_横向山海旅途舞台总场景.png") center / cover no-repeat,
          #15100c;
        color: var(--ink);
      }

      main {
        min-height: 100svh;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 12px;
        padding: clamp(12px, 2.8vw, 26px);
      }

      header,
      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 64px rgba(0, 0, 0, 0.48);
        backdrop-filter: blur(8px);
      }

      header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 14px;
      }

      .brand {
        margin: 0 0 5px;
        color: var(--muted);
        font: 800 12px/1.1 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      h1 {
        margin: 0;
        font-size: clamp(24px, 4vw, 38px);
        line-height: 1.05;
      }

      a,
      button {
        min-height: 38px;
        border: 1px solid rgba(234, 205, 140, 0.26);
        border-radius: 8px;
        padding: 8px 10px;
        background: rgba(255, 238, 189, 0.08);
        color: var(--ink);
        font: 800 12px/1.1 "PingFang SC", "Microsoft YaHei", sans-serif;
        text-align: center;
        text-decoration: none;
        cursor: pointer;
      }

      button.primary,
      a.primary {
        border-color: rgba(217, 170, 91, 0.58);
        background: rgba(217, 170, 91, 0.16);
      }

      .top-actions {
        display: grid;
        grid-template-columns: repeat(3, minmax(90px, 1fr));
        gap: 8px;
      }

      .workspace {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(330px, 0.88fr) minmax(420px, 1.12fr);
        gap: 12px;
      }

      .panel {
        min-height: 0;
        padding: 14px;
      }

      .panel h2 {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 17px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .field {
        display: grid;
        gap: 5px;
      }

      label {
        color: var(--muted);
        font: 800 11px/1.1 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid rgba(234, 205, 140, 0.2);
        border-radius: 8px;
        background: rgba(8, 7, 5, 0.66);
        color: var(--ink);
        padding: 9px;
        font: 13px/1.45 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      textarea {
        min-height: 116px;
        resize: vertical;
      }

      .button-row,
      .summary-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .summary-row {
        margin: 0 0 10px;
      }

      .chip {
        border: 1px solid rgba(234, 205, 140, 0.2);
        border-radius: 999px;
        padding: 7px 9px;
        background: var(--soft);
        color: var(--muted);
        font: 800 11px/1 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .chip strong { color: var(--ink); }

      .batch-list {
        display: grid;
        gap: 8px;
        max-height: calc(100svh - 230px);
        overflow: auto;
        padding-right: 2px;
      }

      .batch-item {
        border: 1px solid rgba(234, 205, 140, 0.18);
        border-radius: 8px;
        padding: 10px;
        background: rgba(8, 7, 5, 0.56);
      }

      .batch-item[data-status="已完成"] {
        border-color: rgba(143, 183, 108, 0.42);
        background: rgba(111, 140, 98, 0.12);
      }

      .batch-item[data-status="待追收"] {
        border-color: rgba(217, 170, 91, 0.42);
      }

      .batch-item[data-status="阻断"] {
        border-color: rgba(166, 64, 50, 0.54);
      }

      .batch-item h3 {
        margin: 0 0 6px;
        font: 900 14px/1.2 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-bottom: 8px;
      }

      .meta span {
        border: 1px solid rgba(234, 205, 140, 0.14);
        border-radius: 999px;
        padding: 4px 6px;
        color: var(--muted);
        font: 800 10px/1 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .hint,
      .note {
        color: var(--muted);
        font: 12px/1.55 "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .summary-box {
        min-height: 130px;
        margin-top: 10px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      @media (max-width: 900px) {
        header,
        .workspace {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <p class="brand">《不思异：九州》P0 真人发测</p>
          <h1>发测批次台</h1>
        </div>
        <div class="top-actions">
          <a class="primary" href="./试玩入口.html">试玩入口</a>
          <a href="./P0人工反馈收件台.html">P0 人工反馈收件台</a>
          <a href="./P0真人试玩验收工作台.html">真人验收台</a>
        </div>
      </header>

      <div class="workspace">
        <section class="panel" aria-label="新增发测批次">
          <h2>新增一批发测</h2>
          <div class="field-grid">
            <div class="field">
              <label for="batchName">批次名</label>
              <input id="batchName" type="text" placeholder="P0-朋友第一批 / 编剧组 / 内测A" />
            </div>
            <div class="field">
              <label for="testerList">测试者</label>
              <input id="testerList" type="text" placeholder="姓名或代号，用逗号分隔" />
            </div>
            <div class="field">
              <label for="channelName">渠道</label>
              <input id="channelName" type="text" placeholder="微信 / 飞书 / 现场" />
            </div>
            <div class="field">
              <label for="batchStatus">状态</label>
              <select id="batchStatus">
                <option value="待发送">待发送</option>
                <option value="已发送">已发送</option>
                <option value="待追收">待追收</option>
                <option value="已完成">已完成</option>
                <option value="阻断">阻断</option>
              </select>
            </div>
            <div class="field">
              <label for="taskType">任务类型</label>
              <select id="taskType">
                <option value="5分钟试玩+听音">5分钟试玩+听音</option>
                <option value="只做5分钟试玩">只做5分钟试玩</option>
                <option value="只做3分钟听音">只做3分钟听音</option>
                <option value="内容/山海氛围反馈">内容/山海氛围反馈</option>
              </select>
            </div>
            <div class="field">
              <label for="targetCount">目标反馈数</label>
              <input id="targetCount" type="number" min="1" step="1" placeholder="默认等于测试者人数" />
            </div>
            <div class="field">
              <label for="receivedCount">已回收反馈</label>
              <input id="receivedCount" type="number" min="0" step="1" placeholder="已收到几份" />
            </div>
            <div class="field">
              <label for="sentAt">发送时间</label>
              <input id="sentAt" type="text" placeholder="今天 / 6月25日晚 / 待定" />
            </div>
            <div class="field">
              <label for="dueAt">追收时间</label>
              <input id="dueAt" type="text" placeholder="24小时后 / 明晚 / 现场结束后" />
            </div>
          </div>
          <p class="hint">发给测试者时统一使用固定入口 `https://webdeploy-green.vercel.app/`；试玩密码：tusun2026。</p>
          <textarea id="batchNotes" placeholder="记录谁已回复、谁需要追收、是否只听音、是否需要电话说明"></textarea>
          <div class="button-row">
            <button class="primary" id="addBatch" type="button">加入批次台</button>
            <button id="copyInvite" type="button">复制本批邀请</button>
            <button id="copyFollowup" type="button">复制本批追收</button>
            <button id="clearDraft" type="button">清空输入</button>
          </div>
          <p class="hint" id="draftHint">批次台只保存在当前浏览器 localStorage；阶段结束时复制汇总回填主线程。</p>
          <textarea class="summary-box" id="scratchOutput" readonly></textarea>
        </section>

        <section class="panel" aria-label="发测批次列表">
          <h2>发测批次</h2>
          <div class="summary-row" aria-label="发测统计">
            <span class="chip">批次 <strong id="totalCount">0</strong></span>
            <span class="chip">已发送 <strong id="sentCount">0</strong></span>
            <span class="chip">待追收 <strong id="followCount">0</strong></span>
            <span class="chip">已完成 <strong id="doneCount">0</strong></span>
            <span class="chip">还差反馈 <strong id="missingCount">0</strong></span>
          </div>
          <div class="button-row">
            <button id="copySummary" type="button">复制发测汇总</button>
            <button id="copyJson" type="button">复制 JSON</button>
            <button id="clearBatches" type="button">清空批次台</button>
          </div>
          <p class="note" id="copyState">建议：发出后 24 小时内追收一次；收到反馈后先进入反馈收件台编号。</p>
          <div class="batch-list" id="batchList"></div>
        </section>
      </div>
    </main>

    <script>
      const STORAGE_KEY = "bsi.p0.playtest.batch.v1";
      const PLAYTEST_URL = "https://webdeploy-green.vercel.app/";
      const PLAYTEST_PASSWORD = "tusun2026";
      const fields = {
        batchName: document.querySelector("#batchName"),
        testerList: document.querySelector("#testerList"),
        channelName: document.querySelector("#channelName"),
        batchStatus: document.querySelector("#batchStatus"),
        taskType: document.querySelector("#taskType"),
        targetCount: document.querySelector("#targetCount"),
        receivedCount: document.querySelector("#receivedCount"),
        sentAt: document.querySelector("#sentAt"),
        dueAt: document.querySelector("#dueAt"),
        batchNotes: document.querySelector("#batchNotes"),
        scratchOutput: document.querySelector("#scratchOutput")
      };
      const batchList = document.querySelector("#batchList");
      const copyState = document.querySelector("#copyState");
      const draftHint = document.querySelector("#draftHint");

      function nowStamp() {
        return new Date().toLocaleString("zh-CN");
      }

      function loadBatches() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        } catch {
          localStorage.removeItem(STORAGE_KEY);
          return [];
        }
      }

      function saveBatches(batches) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(batches));
      }

      function splitTesters(value) {
        return String(value || "")
          .split(/[,，、\n]/)
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function buildDraft() {
        const testers = splitTesters(fields.testerList.value);
        const targetCount = Math.max(1, Number.parseInt(fields.targetCount.value, 10) || testers.length || 1);
        const receivedCount = Math.max(0, Number.parseInt(fields.receivedCount.value, 10) || 0);
        return {
          id: `P0-BATCH-${Date.now().toString(36).toUpperCase()}`,
          createdAt: nowStamp(),
          batchName: fields.batchName.value.trim() || "未命名批次",
          testers,
          channel: fields.channelName.value.trim() || "未填",
          status: fields.batchStatus.value,
          taskType: fields.taskType.value,
          targetCount,
          receivedCount,
          missingCount: Math.max(0, targetCount - receivedCount),
          sentAt: fields.sentAt.value.trim() || "未填",
          dueAt: fields.dueAt.value.trim() || "未填",
          notes: fields.batchNotes.value.trim(),
          next: getNext(fields.batchStatus.value, testers.length, targetCount, receivedCount)
        };
      }

      function getNext(status, testerCount, targetCount = testerCount, receivedCount = 0) {
        if (!testerCount) return "先补测试者名单";
        if (receivedCount >= targetCount) return "反馈数已够，贴入反馈收件台并进入真人验收";
        if (status === "待发送") return "复制本批邀请并发出";
        if (status === "已发送") return "到追收时间后复制追收消息";
        if (status === "待追收") return "追收反馈，收到后贴入反馈收件台";
        if (status === "已完成") return "把反馈收件汇总贴入真人验收台";
        return "确认阻断原因并决定是否换测试者";
      }

      function buildInvite(batch = buildDraft()) {
        return [
          "《不思异：九州》内部试玩邀请",
          "",
          "想请你帮忙试一个 5 分钟的横屏网页版 Demo：",
          PLAYTEST_URL,
          `试玩密码：${PLAYTEST_PASSWORD}`,
          "",
          "请横屏打开，像第一次玩手机游戏一样试玩，不用研究攻略。",
          `这次任务：${batch.taskType || "5分钟试玩+听音"}`,
          "",
          "试玩时只看 5 件事：",
          "1. 是否一眼知道下一步点哪里。",
          "2. 车轴、粮草、神志是否看得懂、有压力。",
          "3. 哪一刻最像游戏，哪一刻还像网页。",
          "4. 音乐/音效是加分还是打扰。",
          "5. 如果走到结局，请点“复盘本局”里的“复制反馈包”发回。",
          "",
          `批次：${batch.batchName}`,
          `目标回收：${batch.targetCount || batch.testers.length || 1} 份反馈`,
          `预计追收：${batch.dueAt}`
        ].join("\n");
      }

      function buildFollowup(batch = buildDraft()) {
        return [
          "再麻烦你补一下《不思异：九州》的试玩反馈。",
          "",
          "最省事的方式：",
          "1. 走到结局：点“复盘本局”里的“复制反馈包”发回。",
          "2. 没走到结局：说一下卡在哪里、是否知道下一步、资源压力是否看得懂。",
          "3. 只听了声音：说一下音乐/音效是加分、打扰，还是没感觉。",
          "",
          `试玩入口：${PLAYTEST_URL}`,
          `试玩密码：${PLAYTEST_PASSWORD}`,
          `批次：${batch.batchName}`,
          `还差反馈：${Math.max(0, (batch.targetCount || 1) - (batch.receivedCount || 0))} 份`
        ].join("\n");
      }

      function buildSummary(batches = loadBatches()) {
        const sent = batches.filter((batch) => ["已发送", "待追收", "已完成"].includes(batch.status)).length;
        const follow = batches.filter((batch) => batch.status === "待追收").length;
        const done = batches.filter((batch) => batch.status === "已完成").length;
        const testerTotal = batches.reduce((sum, batch) => sum + batch.testers.length, 0);
        const targetTotal = batches.reduce((sum, batch) => sum + (batch.targetCount || batch.testers.length || 0), 0);
        const receivedTotal = batches.reduce((sum, batch) => sum + (batch.receivedCount || 0), 0);
        const missingTotal = Math.max(0, targetTotal - receivedTotal);
        return [
          "# 《不思异：九州》P0 发测批次汇总",
          "",
          `生成时间：${nowStamp()}`,
          `批次：${batches.length}；测试者：${testerTotal}；目标反馈：${targetTotal}；已回收反馈：${receivedTotal}；还差反馈：${missingTotal}；已发送批次：${sent}；待追收：${follow}；已完成：${done}`,
          `固定入口：${PLAYTEST_URL}`,
          `试玩密码：${PLAYTEST_PASSWORD}`,
          "",
          "## 明细",
          "",
          ...batches.map((batch) => [
            `### ${batch.id} / ${batch.batchName}`,
            "",
            `- 测试者：${batch.testers.join("、") || "未填"}`,
            `- 渠道：${batch.channel}`,
            `- 状态：${batch.status}`,
            `- 任务类型：${batch.taskType || "5分钟试玩+听音"}`,
            `- 目标反馈数：${batch.targetCount || batch.testers.length || 1}`,
            `- 已回收反馈：${batch.receivedCount || 0}`,
            `- 还差反馈：${Math.max(0, (batch.targetCount || batch.testers.length || 1) - (batch.receivedCount || 0))}`,
            `- 发送时间：${batch.sentAt}`,
            `- 追收时间：${batch.dueAt}`,
            `- 下一步：${batch.next}`,
            `- 备注：${batch.notes || "无"}`,
            ""
          ].join("\n")),
          "## 主线程下一步",
          "",
          follow
            ? "先追收待追收批次；收到反馈后进入 P0 人工反馈收件台。"
            : "继续发出下一批，直到回收到可进入真人验收台的完整反馈。"
        ].join("\n");
      }

      function render() {
        const batches = loadBatches();
        document.querySelector("#totalCount").textContent = batches.length;
        document.querySelector("#sentCount").textContent = batches.filter((batch) => ["已发送", "待追收", "已完成"].includes(batch.status)).length;
        document.querySelector("#followCount").textContent = batches.filter((batch) => batch.status === "待追收").length;
        document.querySelector("#doneCount").textContent = batches.filter((batch) => batch.status === "已完成").length;
        document.querySelector("#missingCount").textContent = batches.reduce((sum, batch) => {
          const target = batch.targetCount || batch.testers.length || 1;
          const received = batch.receivedCount || 0;
          return sum + Math.max(0, target - received);
        }, 0);
        batchList.replaceChildren();
        if (!batches.length) {
          const empty = document.createElement("p");
          empty.className = "hint";
          empty.textContent = "还没有发测批次。先在左侧登记一批测试者。";
          batchList.append(empty);
          return;
        }
        batches.forEach((batch) => {
          const card = document.createElement("article");
          card.className = "batch-item";
          card.dataset.status = batch.status;
          const title = document.createElement("h3");
          title.textContent = `${batch.id} / ${batch.batchName}`;
          const meta = document.createElement("div");
          meta.className = "meta";
          [batch.status, batch.taskType || "5分钟试玩+听音", `${batch.testers.length} 人`, `回收 ${batch.receivedCount || 0}/${batch.targetCount || batch.testers.length || 1}`, batch.channel, `追收 ${batch.dueAt}`].forEach((value) => {
            const span = document.createElement("span");
            span.textContent = value;
            meta.append(span);
          });
          const note = document.createElement("p");
          note.className = "note";
          note.textContent = `测试者：${batch.testers.join("、") || "未填"}；下一步：${batch.next}`;
          card.append(title, meta, note);
          batchList.append(card);
        });
      }

      async function copyText(text, success) {
        fields.scratchOutput.value = text;
        try {
          await navigator.clipboard.writeText(text);
          copyState.textContent = success;
        } catch {
          fields.scratchOutput.focus();
          fields.scratchOutput.select();
          copyState.textContent = "浏览器未放行复制，已选中文本，可手动复制。";
        }
      }

      document.querySelector("#addBatch").addEventListener("click", () => {
        const batch = buildDraft();
        if (!batch.testers.length) {
          draftHint.textContent = "请至少填写一个测试者。";
          return;
        }
        const batches = loadBatches();
        batches.unshift(batch);
        saveBatches(batches);
        fields.scratchOutput.value = buildSummary(batches);
        draftHint.textContent = `已加入 ${batch.id}，状态：${batch.status}。`;
        render();
      });

      document.querySelector("#copyInvite").addEventListener("click", () => {
        copyText(buildInvite(), "本批试玩邀请已复制。");
      });

      document.querySelector("#copyFollowup").addEventListener("click", () => {
        copyText(buildFollowup(), "本批追收消息已复制。");
      });

      document.querySelector("#copySummary").addEventListener("click", () => {
        copyText(buildSummary(), "发测汇总已复制，可回填主线程。");
      });

      document.querySelector("#copyJson").addEventListener("click", () => {
        copyText(JSON.stringify(loadBatches(), null, 2), "JSON 已复制。");
      });

      document.querySelector("#clearDraft").addEventListener("click", () => {
        fields.batchName.value = "";
        fields.testerList.value = "";
        fields.channelName.value = "";
        fields.batchStatus.value = "待发送";
        fields.taskType.value = "5分钟试玩+听音";
        fields.targetCount.value = "";
        fields.receivedCount.value = "";
        fields.sentAt.value = "";
        fields.dueAt.value = "";
        fields.batchNotes.value = "";
        fields.scratchOutput.value = "";
        draftHint.textContent = "输入已清空。";
      });

      document.querySelector("#clearBatches").addEventListener("click", () => {
        localStorage.removeItem(STORAGE_KEY);
        fields.scratchOutput.value = "";
        copyState.textContent = "批次台已清空。";
        render();
      });

      fields.batchNotes.addEventListener("input", () => {
        fields.scratchOutput.value = fields.batchNotes.value.trim() ? buildSummary([buildDraft()]) : "";
      });

      render();
    </script>
  </body>
</html>
